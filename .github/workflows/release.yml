name: Release

# Build all three desktop bundles and attach them to a GitHub release when a v*
# tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Linux (AppImage) and Windows (single exe) each run on their own native runner;
# macOS (.dmg) builds natively on an arm64 runner, since the app links
# FFmpeg/CoreAudio at build time and can't be cross-compiled there. Intel macOS
# is no longer built (the macos-13 image retired Dec 2025; Apple has dropped
# x86_64). All runners are free for public repos (no minute cap).
#
# Each build job uploads its files as workflow artifacts; a final `release` job
# collects them and publishes once (so the jobs don't race on the same release).
# workflow_dispatch lets you build on demand without tagging — grab the bundles
# from the run's Artifacts instead of a release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-22.04  # older glibc => AppImage runs on a wider range of desktops
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libavdevice-dev libswscale-dev libswresample-dev \
            clang pkg-config libasound2-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build Linux AppImage
        run: ./scripts/make-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: yt-dlp-clipper-*-x86_64.AppImage

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # MSYS2 UCRT64 provides make/nasm (needed by FFmpeg's build system) and
      # static codec libs (x264, vpx, opus, lame) that static-ffmpeg links against.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit   # make rustup's cargo visible inside the MSYS2 shell
          install: >-
            nasm
            make
            diffutils
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-x264
            mingw-w64-ucrt-x86_64-libvpx
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-lame

      # Install the GNU Rust toolchain and make it the default so HOST == TARGET
      # (both x86_64-pc-windows-gnu). ffmpeg-sys-the-third's build script has a
      # HOST != TARGET branch that assumes a cross-compiler prefix like
      # "x86_64-w64-mingw32-gcc"; skipping that branch avoids a panic on rfind('-').
      - name: Install MinGW Rust toolchain
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --no-self-update
          rustup default stable-x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      # Download the two binaries that get baked into the exe via bundle-tools.
      # yt-dlp: self-contained PyInstaller exe (no Python needed).
      # ffmpeg: gyan's full_build (statically linked, no DLL deps) — provides the
      #   ffmpeg CLI that yt-dlp calls to merge video+audio streams at runtime.
      - name: Download embedded binaries
        shell: bash
        run: |
          mkdir -p build/windows
          curl -fsSLo build/windows/yt-dlp.exe \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
          curl -fsSLo build/windows/ffmpeg.7z \
            'https://github.com/GyanD/codexffmpeg/releases/download/6.0/ffmpeg-6.0-full_build.7z'
          7z e -y build/windows/ffmpeg.7z 'ffmpeg-6.0-full_build/bin/ffmpeg.exe' \
            -obuild/windows/ >/dev/null

      # Build in MSYS2 shell so FFmpeg's configure script can find make/nasm and
      # pkg-config can resolve the static codec libs from UCRT64.
      # -C target-feature=+crt-static links libgcc/winpthread statically so the
      # exe depends only on Windows system DLLs (always present).
      - name: Build single exe
        shell: msys2 {0}
        run: |
          # Convert POSIX paths to Windows paths so Windows-native tools
          # (pkg-config, libclang) can find them when invoked by build scripts.
          export PKG_CONFIG_PATH="$(cygpath -w /ucrt64/lib/pkgconfig)"
          export PKG_CONFIG_ALL_STATIC=1
          export LIBCLANG_PATH="$(cygpath -w /ucrt64/bin)"
          export BUNDLE_YTDLP="$(cygpath -w "$(pwd)/build/windows/yt-dlp.exe")"
          export BUNDLE_FFMPEG_CLI="$(cygpath -w "$(pwd)/build/windows/ffmpeg.exe")"
          export RUSTFLAGS="-C target-feature=+crt-static"
          # The cc crate looks for x86_64-w64-mingw32-gcc by default; in UCRT64
          # the native compiler is just gcc, so point it there explicitly.
          export CC_x86_64_pc_windows_gnu=gcc
          export CXX_x86_64_pc_windows_gnu=g++
          export AR_x86_64_pc_windows_gnu=ar
          export RUST_BACKTRACE=1
          cargo build --release --features bundle-tools

      - name: Stage release exe
        shell: bash
        run: |
          VERSION="${VERSION:-$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)}"
          cp target/release/yt-dlp-clipper.exe \
             "yt-dlp-clipper-${VERSION}-win64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: yt-dlp-clipper-*-win64.exe

  macos:
    runs-on: macos-14   # Apple Silicon (arm64) only; Intel macOS dropped (macos-13 image retired Dec 2025)
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        # ffmpeg@6 matches the ffmpeg-the-third 1.2 pin (brew's default ffmpeg is 7.x).
        run: brew install ffmpeg@6 pkg-config dylibbundler

      - uses: Swatinem/rust-cache@v2

      - name: Build macOS .app + .dmg
        run: ./scripts/make-macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: yt-dlp-clipper-*-macos-*.dmg

  release:
    needs: [linux, windows, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Collect build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
