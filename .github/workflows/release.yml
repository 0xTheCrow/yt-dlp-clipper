name: Release

# Build all three desktop bundles and attach them to a GitHub release when a v*
# tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Linux (AppImage) and Windows (single exe) each run on their own native runner;
# macOS (.dmg) builds natively on an arm64 runner, since the app links
# FFmpeg/CoreAudio at build time and can't be cross-compiled there. Intel macOS
# is no longer built (the macos-13 image retired Dec 2025; Apple has dropped
# x86_64). All runners are free for public repos (no minute cap).
#
# Each build job uploads its files as workflow artifacts; a final `release` job
# collects them and publishes once (so the jobs don't race on the same release).
# workflow_dispatch lets you build on demand without tagging — grab the bundles
# from the run's Artifacts instead of a release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-22.04  # older glibc => AppImage runs on a wider range of desktops
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libavdevice-dev libswscale-dev libswresample-dev \
            clang pkg-config libasound2-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build Linux AppImage
        run: ./scripts/make-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: yt-dlp-clipper-*-x86_64.AppImage

  windows:
    # Build the single self-contained exe natively on Windows with the MSVC
    # toolchain. Static FFmpeg + codecs come from vcpkg (x64-windows-static);
    # ffmpeg-sys-the-third's vcpkg path links libav* + x264/vpx/opus/mp3lame and
    # adds the Windows system libs itself. MSVC's linker resolves order-
    # independently, so none of the MinGW cross-compile pitfalls (GNU ld single-
    # pass ordering, _FORTIFY_SOURCE/libssp, hand-maintained transitive deps)
    # apply. `+crt-static` links the CRT statically, so the exe needs no VCRedist.
    runs-on: windows-2022
    env:
      VCPKG_ROOT: C:\vcpkg
      # vcpkg writes built package archives here; caching this dir makes repeat
      # runs skip the (slow) FFmpeg compile.
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-cache
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Add Rust MSVC target
        run: rustup target add x86_64-pc-windows-msvc

      # Activate the MSVC environment (sets INCLUDE/LIB/PATH) so ffmpeg-sys-the-
      # third's bindgen pass can find the MSVC + Windows SDK system headers; clang
      # reads the system include dirs from INCLUDE on the MSVC target.
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg-cache
          key: vcpkg-ffmpeg-static-v1-${{ hashFiles('.github/workflows/release.yml') }}

      # GPL build: x264 (the only H.264 encoder) makes the binary GPL — accepted.
      - name: Build static FFmpeg via vcpkg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            "ffmpeg[avcodec,avformat,avfilter,swscale,swresample,gpl,x264,vpx,opus,mp3lame]:x64-windows-static"

      # yt-dlp: self-contained PyInstaller exe (no Python dependency).
      # ffmpeg CLI: gyan full_build static exe — the runtime binary yt-dlp calls
      #   to merge streams; separate from the libav* we link at build time.
      - name: Download embedded tool binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\windows | Out-Null
          Invoke-WebRequest -UseBasicParsing `
            -Uri https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe `
            -OutFile build\windows\yt-dlp.exe
          Invoke-WebRequest -UseBasicParsing `
            -Uri https://github.com/GyanD/codexffmpeg/releases/download/6.0/ffmpeg-6.0-full_build.7z `
            -OutFile build\windows\ffmpeg.7z
          7z e -y build\windows\ffmpeg.7z "ffmpeg-6.0-full_build/bin/ffmpeg.exe" -obuild\windows\

      # VCPKGRS_TRIPLET → make the vcpkg crate use the static triplet we built.
      # +crt-static → static CRT, matching x64-windows-static, so no VCRedist dep.
      # LIBCLANG_PATH → libclang for ffmpeg-sys-the-third's bindgen pass.
      - name: Build Windows exe
        shell: pwsh
        env:
          VCPKGRS_TRIPLET: x64-windows-static
          RUSTFLAGS: -C target-feature=+crt-static
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
          BUNDLE_YTDLP: ${{ github.workspace }}\build\windows\yt-dlp.exe
          BUNDLE_FFMPEG_CLI: ${{ github.workspace }}\build\windows\ffmpeg.exe
        run: cargo build --release --target x86_64-pc-windows-msvc --features bundle-tools

      - name: Stage release exe
        shell: bash
        run: |
          VERSION="${VERSION:-$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)}"
          cp target/x86_64-pc-windows-msvc/release/yt-dlp-clipper.exe \
             "yt-dlp-clipper-${VERSION}-win64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: yt-dlp-clipper-*-win64.exe

  macos:
    runs-on: macos-14   # Apple Silicon (arm64) only; Intel macOS dropped (macos-13 image retired Dec 2025)
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        # ffmpeg@6 matches the ffmpeg-the-third 1.2 pin (brew's default ffmpeg is 7.x).
        run: brew install ffmpeg@6 pkg-config dylibbundler

      - uses: Swatinem/rust-cache@v2

      - name: Build macOS .app + .dmg
        run: ./scripts/make-macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: yt-dlp-clipper-*-macos-*.dmg

  release:
    needs: [linux, windows, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Collect build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
