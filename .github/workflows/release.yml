name: Release

# Build all three desktop bundles and attach them to a GitHub release when a v*
# tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Linux (AppImage) + Windows (cross-compiled via cargo-xwin) build on one Ubuntu
# job; macOS (.dmg) builds natively on an arm64 runner, since the app links
# FFmpeg/CoreAudio at build time and can't be cross-compiled there. Intel macOS
# is no longer built (the macos-13 image retired Dec 2025; Apple has dropped
# x86_64). macOS CI is free because this repo is public (standard runners).
#
# Each build job uploads its files as workflow artifacts; a final `release` job
# collects them and publishes once (so the jobs don't race on the same release).
# workflow_dispatch lets you build on demand without tagging — grab the bundles
# from the run's Artifacts instead of a release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write          # GITHUB_TOKEN needs this to create the release

jobs:
  linux-windows:           # one Ubuntu job builds BOTH the Linux AppImage and the cross-compiled Windows bundle
    runs-on: ubuntu-22.04  # older glibc => the AppImage runs on a wider range of desktops
    steps:
      - uses: actions/checkout@v4

      # The packaging scripts name bundles from $VERSION, falling back to Cargo.toml
      # when it's unset. On a tag, set it to the tag minus its leading `v` so the
      # filenames match the release name.
      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libavdevice-dev libswscale-dev libswresample-dev \
            clang pkg-config libasound2-dev \
            lld llvm p7zip-full zip

      - name: Add Windows target
        run: rustup target add x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked

      - name: Build Linux AppImage
        run: ./scripts/make-appimage.sh

      - name: Build Windows bundle
        run: ./scripts/make-windows.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-windows
          path: |
            yt-dlp-clipper-*-x86_64.AppImage
            yt-dlp-clipper-*-win64.zip

  macos:
    runs-on: macos-14   # Apple Silicon (arm64) only; Intel macOS dropped (macos-13 image retired Dec 2025)
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        # ffmpeg@6 matches the ffmpeg-the-third 1.2 pin (brew's default ffmpeg is 7.x).
        run: brew install ffmpeg@6 pkg-config dylibbundler

      - uses: Swatinem/rust-cache@v2

      - name: Build macOS .app + .dmg
        run: ./scripts/make-macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: yt-dlp-clipper-*-macos-*.dmg

  release:
    needs: [linux-windows, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Collect build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
