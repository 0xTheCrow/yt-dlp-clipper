name: Release

# Build the Linux AppImage and the Windows bundle and attach them to a GitHub
# release whenever a v* tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Both artifacts build on Linux — the Windows bundle cross-compiles via cargo-xwin
# (scripts/make-windows.sh) — so one Ubuntu job covers both targets. macOS would
# need its own runner + packaging script (not built yet). Pinned to ubuntu-22.04
# for an older glibc, so the AppImage runs on a wider range of desktops.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write          # GITHUB_TOKEN needs this to create the release

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libavdevice-dev libswscale-dev libswresample-dev \
            clang pkg-config libasound2-dev \
            lld llvm p7zip-full zip

      - name: Add Windows target
        run: rustup target add x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked

      - name: Build Linux AppImage
        run: ./scripts/make-appimage.sh

      - name: Build Windows bundle
        run: ./scripts/make-windows.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            yt-dlp-clipper-*-x86_64.AppImage
            yt-dlp-clipper-*-win64.zip
