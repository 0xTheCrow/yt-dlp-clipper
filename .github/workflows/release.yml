name: Release

# Build all three desktop bundles and attach them to a GitHub release when a v*
# tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Linux (AppImage) and Windows (single exe) each run on their own native runner;
# macOS (.dmg) builds natively on an arm64 runner, since the app links
# FFmpeg/CoreAudio at build time and can't be cross-compiled there. Intel macOS
# is no longer built (the macos-13 image retired Dec 2025; Apple has dropped
# x86_64). All runners are free for public repos (no minute cap).
#
# Each build job uploads its files as workflow artifacts; a final `release` job
# collects them and publishes once (so the jobs don't race on the same release).
# workflow_dispatch lets you build on demand without tagging — grab the bundles
# from the run's Artifacts instead of a release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-22.04  # older glibc => AppImage runs on a wider range of desktops
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libavdevice-dev libswscale-dev libswresample-dev \
            clang pkg-config libasound2-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build Linux AppImage
        run: ./scripts/make-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: yt-dlp-clipper-*-x86_64.AppImage

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # MSYS2 UCRT64 provides: make/nasm (FFmpeg's build system), clang/libclang
      # (bindgen), and static codec libs (x264, vpx, opus, lame) that FFmpeg links.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit   # make rustup's cargo visible inside the MSYS2 shell
          install: >-
            nasm
            make
            diffutils
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-x264
            mingw-w64-ucrt-x86_64-libvpx
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-lame

      # Install the GNU Rust toolchain and make it the default so HOST == TARGET
      # (both x86_64-pc-windows-gnu). ffmpeg-sys-the-third's build script has a
      # HOST != TARGET branch that panics when the C compiler name has no hyphen
      # (e.g. bare "gcc"); skipping that branch by keeping HOST == TARGET avoids it.
      - name: Install MinGW Rust toolchain
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --no-self-update
          rustup default stable-x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      # Cache the static FFmpeg install so repeated CI runs skip the 10-15 min build.
      # Key includes the workflow file hash; bump v1 manually if configure flags change.
      - name: Cache static FFmpeg 6.0
        uses: actions/cache@v4
        id: ffmpeg-cache
        with:
          path: C:\msys64\ucrt64\custom-ffmpeg
          key: ffmpeg-6.0-ucrt64-static-v2-${{ hashFiles('.github/workflows/release.yml') }}

      # Build FFmpeg 6.0 statically in the MSYS2 shell, where ./configure is a
      # real bash script and can run. The Rust build script cannot do this (it runs
      # as a Windows process and can't exec a shell script directly — that's why
      # static-ffmpeg / ffmpeg-the-third/build can't be used on Windows).
      # We only enable the codecs the app actually uses; --disable-autodetect keeps
      # everything else off so there are no surprise system-library dependencies.
      - name: Build static FFmpeg 6.0
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          mkdir -p build/ffmpeg-src
          curl -fsSL https://ffmpeg.org/releases/ffmpeg-6.0.tar.bz2 \
            | tar xj -C build/ffmpeg-src --strip-components=1
          cd build/ffmpeg-src
          ./configure \
            --prefix=/ucrt64/custom-ffmpeg \
            --target-os=mingw32 \
            --arch=x86_64 \
            --enable-cross-compile \
            --cross-prefix= \
            --enable-static --disable-shared \
            --enable-gpl \
            --disable-autodetect \
            --disable-programs --disable-doc \
            --enable-avcodec --enable-avdevice --enable-avfilter \
            --enable-avformat --enable-swresample --enable-swscale \
            --disable-postproc \
            --enable-libx264 --enable-libvpx --enable-libopus --enable-libmp3lame \
            --extra-cflags="-I/ucrt64/include -fno-tree-vectorize -fno-slp-vectorize" \
            --extra-ldflags="-L/ucrt64/lib" \
            --pkg-config-flags="--static"
          make -j$(nproc)
          make install

      # Download the two binaries baked into the exe by the bundle-tools feature.
      # yt-dlp: self-contained PyInstaller exe (no Python dependency).
      # ffmpeg CLI: gyan's full_build static exe — the runtime tool yt-dlp calls to
      #   merge video+audio streams; separate from the libav* we link at build time.
      - name: Download embedded binaries
        shell: bash
        run: |
          mkdir -p build/windows
          curl -fsSLo build/windows/yt-dlp.exe \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
          curl -fsSLo build/windows/ffmpeg.7z \
            'https://github.com/GyanD/codexffmpeg/releases/download/6.0/ffmpeg-6.0-full_build.7z'
          7z e -y build/windows/ffmpeg.7z 'ffmpeg-6.0-full_build/bin/ffmpeg.exe' \
            -obuild/windows/ >/dev/null

      # FFMPEG_DIR (Windows path) → ffmpeg-sys-the-third's FFMPEG_DIR path: links
      #   the static libav* from our pre-built install and finds the headers there.
      #   No ./configure is invoked — just a link-search + include-path setup.
      # CODEC_LIB_DIR (Windows path) → our build.rs emits a link-search for the
      #   codec .a files (x264, vpx, opus, mp3lame) that libav* depends on.
      # LIBCLANG_PATH → where bindgen finds libclang.dll for header parsing.
      # +crt-static → links libgcc/winpthread statically; exe needs only Windows DLLs.
      - name: Build single exe
        shell: msys2 {0}
        run: |
          export FFMPEG_DIR="$(cygpath -w /ucrt64/custom-ffmpeg)"
          export CODEC_LIB_DIR="$(cygpath -w /ucrt64/lib)"
          export LIBCLANG_PATH="$(cygpath -w /ucrt64/bin)"
          export BUNDLE_YTDLP="$(cygpath -w "$(pwd)/build/windows/yt-dlp.exe")"
          export BUNDLE_FFMPEG_CLI="$(cygpath -w "$(pwd)/build/windows/ffmpeg.exe")"
          export RUSTFLAGS="-C target-feature=+crt-static"
          export CC_x86_64_pc_windows_gnu=gcc
          export CXX_x86_64_pc_windows_gnu=g++
          export AR_x86_64_pc_windows_gnu=ar
          export RUST_BACKTRACE=1
          cargo build --release --features bundle-tools

      - name: Stage release exe
        shell: bash
        run: |
          VERSION="${VERSION:-$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)}"
          cp target/release/yt-dlp-clipper.exe \
             "yt-dlp-clipper-${VERSION}-win64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: yt-dlp-clipper-*-win64.exe

  macos:
    runs-on: macos-14   # Apple Silicon (arm64) only; Intel macOS dropped (macos-13 image retired Dec 2025)
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        # ffmpeg@6 matches the ffmpeg-the-third 1.2 pin (brew's default ffmpeg is 7.x).
        run: brew install ffmpeg@6 pkg-config dylibbundler

      - uses: Swatinem/rust-cache@v2

      - name: Build macOS .app + .dmg
        run: ./scripts/make-macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: yt-dlp-clipper-*-macos-*.dmg

  release:
    needs: [linux, windows, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Collect build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
