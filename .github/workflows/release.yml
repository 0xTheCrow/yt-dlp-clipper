name: Release

# Build all three desktop bundles and attach them to a GitHub release when a v*
# tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Linux (AppImage) and Windows (single exe) each run on their own native runner;
# macOS (.dmg) builds natively on an arm64 runner, since the app links
# FFmpeg/CoreAudio at build time and can't be cross-compiled there. Intel macOS
# is no longer built (the macos-13 image retired Dec 2025; Apple has dropped
# x86_64). All runners are free for public repos (no minute cap).
#
# Each build job uploads its files as workflow artifacts; a final `release` job
# collects them and publishes once (so the jobs don't race on the same release).
# workflow_dispatch lets you build on demand without tagging — grab the bundles
# from the run's Artifacts instead of a release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-22.04  # older glibc => AppImage runs on a wider range of desktops
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libswscale-dev libswresample-dev \
            clang pkg-config libasound2-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build Linux AppImage
        run: ./scripts/make-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: yt-dlp-clipper-*-x86_64.AppImage

  windows:
    # One self-contained .exe: FFmpeg, the codecs, and the C runtime are all linked
    # statically, so the file runs on a clean Windows box with no DLLs and no VC++
    # redistributable.
    #
    # vcpkg (Microsoft's C/C++ package manager) is the only source of static FFmpeg
    # libraries built with the MSVC toolchain the Rust exe links against. It compiles
    # FFmpeg from source; ffmpeg-sys-the-third then finds those libs and adds the
    # Windows system libs itself. vcpkg is pinned to a commit whose ffmpeg port is
    # 6.0 to match the FFmpeg 6.x API that ffmpeg-the-third 1.2 targets.
    runs-on: windows-2022
    env:
      # vcpkg stores compiled packages here; caching it skips the ~12-minute FFmpeg
      # build on later runs.
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-cache
      # microsoft/vcpkg commit whose ffmpeg port is 6.0.
      VCPKG_COMMIT: c6d6efed3e9b4242765bfe1b5c5befffd85f7b92
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # Put the MSVC + Windows SDK headers on INCLUDE so ffmpeg-sys-the-third's
      # bindgen pass (libclang) can find the system headers.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - uses: Swatinem/rust-cache@v2

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg-cache
          key: vcpkg-ffmpeg-${{ env.VCPKG_COMMIT }}

      # Pin the preinstalled C:\vcpkg to the 6.0 commit, then build static FFmpeg and
      # the codecs the app encodes with. x264 is the only H.264 encoder, so the
      # binary is GPL — accepted.
      - name: Build static FFmpeg via vcpkg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null
          git -C C:\vcpkg fetch --depth 1 origin $env:VCPKG_COMMIT
          git -C C:\vcpkg checkout $env:VCPKG_COMMIT
          & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          & C:\vcpkg\vcpkg.exe install `
            "ffmpeg[avcodec,avformat,avfilter,swscale,swresample,gpl,x264,vpx,opus,mp3lame]:x64-windows-static"

      # The bundle-tools feature bakes these into the exe and extracts them on first
      # run: yt-dlp, and the ffmpeg CLI yt-dlp calls to merge streams (a runtime
      # tool, separate from the libav* linked above).
      - name: Download embedded tool binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\windows | Out-Null
          Invoke-WebRequest -UseBasicParsing `
            -Uri https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe `
            -OutFile build\windows\yt-dlp.exe
          Invoke-WebRequest -UseBasicParsing `
            -Uri https://github.com/GyanD/codexffmpeg/releases/download/6.0/ffmpeg-6.0-full_build.7z `
            -OutFile build\windows\ffmpeg.7z
          7z e -y build\windows\ffmpeg.7z "ffmpeg-6.0-full_build/bin/ffmpeg.exe" -obuild\windows\

      # The runner's default Rust toolchain already targets MSVC, so a plain release
      # build produces the exe. VCPKG_ROOT points the build at the pinned tree (the
      # MSVC env step otherwise repoints it at a manifest-only copy); +crt-static
      # links the CRT in, matching the x64-windows-static triplet.
      - name: Build Windows exe
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKGRS_TRIPLET: x64-windows-static
          RUSTFLAGS: -C target-feature=+crt-static
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
          BUNDLE_YTDLP: ${{ github.workspace }}\build\windows\yt-dlp.exe
          BUNDLE_FFMPEG_CLI: ${{ github.workspace }}\build\windows\ffmpeg.exe
        run: cargo build --release --features bundle-tools

      - name: Stage release exe
        shell: bash
        run: |
          VERSION="${VERSION:-$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)}"
          cp target/release/yt-dlp-clipper.exe "yt-dlp-clipper-${VERSION}-win64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: yt-dlp-clipper-*-win64.exe

  macos:
    runs-on: macos-14   # Apple Silicon (arm64) only; Intel macOS dropped (macos-13 image retired Dec 2025)
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        # ffmpeg@6 matches the ffmpeg-the-third 1.2 pin (brew's default ffmpeg is 7.x).
        run: brew install ffmpeg@6 pkg-config dylibbundler

      - uses: Swatinem/rust-cache@v2

      - name: Build macOS .app + .dmg
        run: ./scripts/make-macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: yt-dlp-clipper-*-macos-*.dmg

  release:
    needs: [linux, windows, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Collect build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
