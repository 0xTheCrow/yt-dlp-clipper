name: Release

# Build all three desktop bundles and attach them to a GitHub release when a v*
# tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Linux (AppImage) and Windows (single exe) each run on their own native runner;
# macOS (.dmg) builds natively on an arm64 runner, since the app links
# FFmpeg/CoreAudio at build time and can't be cross-compiled there. Intel macOS
# is no longer built (the macos-13 image retired Dec 2025; Apple has dropped
# x86_64). All runners are free for public repos (no minute cap).
#
# Each build job uploads its files as workflow artifacts; a final `release` job
# collects them and publishes once (so the jobs don't race on the same release).
# workflow_dispatch lets you build on demand without tagging — grab the bundles
# from the run's Artifacts instead of a release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-22.04  # older glibc => AppImage runs on a wider range of desktops
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libavdevice-dev libswscale-dev libswresample-dev \
            clang pkg-config libasound2-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build Linux AppImage
        run: ./scripts/make-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: yt-dlp-clipper-*-x86_64.AppImage

  windows:
    # Cross-compile the Windows exe from Linux. FFmpeg's configure is a bash
    # script that runs cleanly on Linux with a MinGW cross-compiler; the MSYS2
    # POSIX-shell-on-Windows approach hits configure's cross-compile detection
    # every time and was never reliable. The GNU Windows target cross-compiles
    # from Linux with no special tooling required.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 \
            nasm make pkg-config \
            clang libclang-dev \
            p7zip-full

      - name: Add Rust Windows GNU target
        run: rustup target add x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-gnu

      # Cache the full codec+FFmpeg static lib tree. Key covers the workflow so
      # any configure-flag change automatically invalidates it.
      - name: Cache Windows FFmpeg + codec static libs
        uses: actions/cache@v4
        id: ffmpeg-cache
        with:
          path: /opt/win-libs
          key: win-cross-ffmpeg-6.0-v2-${{ hashFiles('.github/workflows/release.yml') }}

      # Build static Windows libs via cross-compiler. Each codec is configured
      # with --host=x86_64-w64-mingw32 and installed into the shared prefix so
      # FFmpeg's configure finds them via PKG_CONFIG_LIBDIR.
      # Cross tools are set explicitly (CC/AR/RANLIB) because libtool sometimes
      # ignores --host when the cross-compiler isn't the only thing in PATH.
      - name: Build Windows codec + FFmpeg static libs
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          PREFIX=/opt/win-libs
          CROSS=x86_64-w64-mingw32
          export CC=$CROSS-gcc
          export CXX=$CROSS-g++
          export AR=$CROSS-ar
          export RANLIB=$CROSS-ranlib
          export STRIP=$CROSS-strip
          export NM=$CROSS-nm
          mkdir -p build "$PREFIX"

          # x264
          git clone --depth 1 https://code.videolan.org/videolan/x264.git build/x264
          (cd build/x264 && ./configure \
            --host=$CROSS --cross-prefix=$CROSS- \
            --prefix=$PREFIX \
            --enable-static --disable-shared --disable-cli && \
            make -j$(nproc) && make install)
          test -f "$PREFIX/lib/libx264.a"

          # libvpx — uses CROSS env var for the binary prefix, not --host
          git clone --depth 1 https://github.com/webmproject/libvpx build/libvpx
          (cd build/libvpx && \
            CROSS=$CROSS- ./configure \
            --target=x86_64-win64-gcc \
            --prefix=$PREFIX \
            --enable-static --disable-shared \
            --disable-unit-tests --disable-examples --disable-docs && \
            make -j$(nproc) && make install)
          test -f "$PREFIX/lib/libvpx.a"

          # opus 1.3.1 — use --strip-components=1 to avoid depending on tarball
          # directory name; 1.3.1 is a stable release with configure pre-generated
          mkdir -p build/opus-src
          curl -fsSL https://downloads.xiph.org/releases/opus/opus-1.3.1.tar.gz \
            | tar xz --strip-components=1 -C build/opus-src
          (cd build/opus-src && ./configure \
            --host=$CROSS \
            --prefix=$PREFIX \
            --enable-static --disable-shared \
            --disable-doc --disable-extra-programs && \
            make -j$(nproc) && make install)
          test -f "$PREFIX/lib/libopus.a"

          # mp3lame — strip-components=1 for robustness; explicitly pass cross
          # tools because lame's libtool otherwise silently installs nothing
          mkdir -p build/lame-src
          curl -fsSL \
            https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz \
            | tar xz --strip-components=1 -C build/lame-src
          (cd build/lame-src && ./configure \
            --host=$CROSS \
            --prefix=$PREFIX \
            --enable-static --disable-shared \
            --disable-frontend --disable-gtktest && \
            make -j$(nproc) && make install)
          # libtool cross-compile sometimes skips installing the .a and .pc; fix both
          if ! test -f "$PREFIX/lib/libmp3lame.a"; then
            find build/lame-src -name 'libmp3lame.a' -exec cp {} "$PREFIX/lib/" \;
          fi
          test -f "$PREFIX/lib/libmp3lame.a"
          if ! test -f "$PREFIX/lib/pkgconfig/libmp3lame.pc"; then
            mkdir -p "$PREFIX/lib/pkgconfig"
            printf 'prefix=%s\nexec_prefix=${prefix}\nlibdir=${exec_prefix}/lib\nincludedir=${prefix}/include\n\nName: libmp3lame\nDescription: LAME MP3 encoding library\nVersion: 3.100\nLibs: -L${libdir} -lmp3lame\nCflags: -I${includedir}\n' \
              "$PREFIX" > "$PREFIX/lib/pkgconfig/libmp3lame.pc"
          fi
          test -f "$PREFIX/lib/pkgconfig/libmp3lame.pc"

          # FFmpeg 6.0
          mkdir -p build/ffmpeg-src
          curl -fsSL https://ffmpeg.org/releases/ffmpeg-6.0.tar.bz2 \
            | tar xj --strip-components=1 -C build/ffmpeg-src
          (cd build/ffmpeg-src && \
            PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig" \
            PKG_CONFIG_PATH="" \
            ./configure \
              --prefix=$PREFIX \
              --enable-cross-compile \
              --arch=x86_64 \
              --target-os=mingw32 \
              --cross-prefix=$CROSS- \
              --enable-static --disable-shared \
              --enable-gpl \
              --disable-autodetect \
              --disable-programs --disable-doc \
              --enable-avcodec --enable-avdevice --enable-avfilter \
              --enable-avformat --enable-swresample --enable-swscale \
              --disable-postproc \
              --enable-libx264 --enable-libvpx \
              --enable-libopus --enable-libmp3lame \
              --extra-cflags="-I$PREFIX/include" \
              --extra-ldflags="-L$PREFIX/lib" \
              --pkg-config=pkg-config \
              --pkg-config-flags="--static" && \
            make -j$(nproc) && make install)

      # yt-dlp: self-contained PyInstaller exe (no Python dependency).
      # ffmpeg CLI: gyan full_build static exe — the runtime binary yt-dlp calls
      #   to merge streams; separate from the libav* we link at build time.
      - name: Download embedded binaries
        run: |
          mkdir -p build/windows
          curl -fsSLo build/windows/yt-dlp.exe \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
          curl -fsSLo build/windows/ffmpeg.7z \
            'https://github.com/GyanD/codexffmpeg/releases/download/6.0/ffmpeg-6.0-full_build.7z'
          7z e -y build/windows/ffmpeg.7z 'ffmpeg-6.0-full_build/bin/ffmpeg.exe' \
            -obuild/windows/ >/dev/null

      # FFMPEG_DIR → ffmpeg-sys-the-third uses this to find headers + static libav*.
      # CODEC_LIB_DIR → build.rs adds this search path and links x264/vpx/opus/lame.
      # BINDGEN_EXTRA_CLANG_ARGS → clang needs the MinGW Windows headers when
      #   generating FFI bindings for the Windows target from a Linux host.
      # +crt-static → links libgcc/winpthread statically; exe needs only Windows DLLs.
      - name: Build Windows exe
        env:
          FFMPEG_DIR: /opt/win-libs
          CODEC_LIB_DIR: /opt/win-libs/lib
          BUNDLE_YTDLP: ${{ github.workspace }}/build/windows/yt-dlp.exe
          BUNDLE_FFMPEG_CLI: ${{ github.workspace }}/build/windows/ffmpeg.exe
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
          AR_x86_64_pc_windows_gnu: x86_64-w64-mingw32-ar
          BINDGEN_EXTRA_CLANG_ARGS: >-
            --target=x86_64-w64-windows-gnu
            -I/usr/x86_64-w64-mingw32/include
          RUSTFLAGS: -C target-feature=+crt-static
        run: |
          cargo build --release \
            --target x86_64-pc-windows-gnu \
            --features bundle-tools

      - name: Stage release exe
        run: |
          VERSION="${VERSION:-$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)}"
          cp target/x86_64-pc-windows-gnu/release/yt-dlp-clipper.exe \
             "yt-dlp-clipper-${VERSION}-win64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: yt-dlp-clipper-*-win64.exe

  macos:
    runs-on: macos-14   # Apple Silicon (arm64) only; Intel macOS dropped (macos-13 image retired Dec 2025)
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install build dependencies
        # ffmpeg@6 matches the ffmpeg-the-third 1.2 pin (brew's default ffmpeg is 7.x).
        run: brew install ffmpeg@6 pkg-config dylibbundler

      - uses: Swatinem/rust-cache@v2

      - name: Build macOS .app + .dmg
        run: ./scripts/make-macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: yt-dlp-clipper-*-macos-*.dmg

  release:
    needs: [linux, windows, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Collect build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
